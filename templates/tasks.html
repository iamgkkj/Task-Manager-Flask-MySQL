<!DOCTYPE html>
<html>
<head>
    <title>Task Management</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="logout">
            <a href="/logout">Logout</a>
        </div>
        <h1>Task Management</h1>
        <form method="POST" action="/tasks">
            <div class="form-group">
                <label for="employee_name">Employee Name:</label>
                <input type="text" id="employee_name" name="employee_name" required>
            </div>
            <div class="form-group">
                <label for="task_title">Task Title:</label>
                <select id="task_title" name="task_title" required>
                    <option value="">Select a task</option>
                    <option value="Develop UI">Develop UI</option>
                    <option value="Test API">Test API</option>
                    <option value="Write Docs">Write Docs</option>
                </select>
            </div>
            <div class="form-group">
                <label>Completed:</label>
                <input type="radio" id="completed_true" name="is_completed" value="1">
                <label for="completed_true" style="display: inline;">True</label>
                <input type="radio" id="completed_false" name="is_completed" value="0" checked>
                <label for="completed_false" style="display: inline;">False</label>
            </div>
            <button type="submit">Submit Task</button>
        </form>

        <h2>Existing Tasks</h2>
        <table>
            <tr>
                <th>Task ID</th>
                <th>Employee Name</th>
                <th>Task Title</th>
                <th>Completed</th>
            </tr>
            {% for task in tasks %}
            <tr>
                <td>{{ task[0] }}</td>
                <td>{{ task[1] }}</td>
                <td>{{ task[2] }}</td>
                <td>{{ "Yes" if task[3] == 1 else "No" }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
